version: 2

project_name: tddmaster

before:
  hooks:
    - go mod tidy

builds:
  - id: tddmaster
    main: .
    binary: tddmaster
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  github:
    owner: pragmataW
    name: tddmaster
