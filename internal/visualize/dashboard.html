<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tddmaster · visualize</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --paper: #f7f3ee;
      --surface: #ffffff;
      --ink: #2b2733;
      --ink-2: #6b6577;
      --ink-3: #9b94a6;
      --line: rgba(43,39,51,0.10);
      --accent: #ff7a59;
      --accent-ink: #ffffff;
      --accent-soft: #ffe7df;
      --ok: #2fb98a;
      --shadow: 0 8px 24px rgba(43,39,51,0.10);
      --shadow-sm: 0 3px 12px rgba(43,39,51,0.07);
      --shadow-hover: 0 12px 30px rgba(255,122,89,0.22);
      --grid: transparent;
      --hatch: transparent;
      --code-bg: #2b2733;
      --code-fg: #f7f3ee;
      --radius: 16px;
      --radius-sm: 10px;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    [data-theme="dark"] {
      --paper: #1b1822;
      --surface: #252130;
      --ink: #efebf5;
      --ink-2: #b3acc2;
      --ink-3: #7d7690;
      --line: rgba(239,235,245,0.12);
      --accent: #ff8e6e;
      --accent-ink: #1b1822;
      --accent-soft: #3a2a2e;
      --ok: #4fd6a6;
      --shadow: 0 8px 28px rgba(0,0,0,0.45);
      --shadow-sm: 0 3px 14px rgba(0,0,0,0.40);
      --shadow-hover: 0 12px 32px rgba(255,142,110,0.28);
      --grid: transparent;
      --hatch: transparent;
      --code-bg: #15121b;
      --code-fg: #efebf5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--paper); }

    body {
      font-family: var(--mono);
      background:
        radial-gradient(circle at 12% -8%, var(--accent-soft) 0, transparent 42%),
        radial-gradient(circle at 92% 4%, var(--accent-soft) 0, transparent 38%),
        var(--paper);
      background-attachment: fixed;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.15s, color 0.15s;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-3); border: 3px solid transparent; border-radius: 999px; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); background-clip: padding-box; }

    .mono { font-family: var(--mono); }
    .display { font-family: var(--display); }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--paper) 82%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 1rem 1.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .header-left { flex: 1; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .header-right { flex: 1; justify-content: flex-end; }
    .logo {
      font-family: var(--display);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .logo .dot { color: var(--accent); }
    .spec-badge {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      border-radius: 999px;
    }
    .header-right { display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap; }
    .theme-toggle {
      font-family: var(--display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease, color 0.18s ease;
    }
    .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow); color: var(--accent); }
    .theme-toggle:active { transform: translateY(0) scale(0.97); }

    .phase-badge {
      font-family: var(--display);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 999px;
    }
    .phase-execution { background: var(--accent); color: var(--accent-ink); }
    .phase-completed { background: var(--ink); color: var(--paper); }
    .phase-discovery, .phase-refinement, .phase-listen-first, .phase-spec-settings { background: var(--surface); }

    .container {
      max-width: 1320px;
      width: 100%;
      margin: 0 auto;
      padding: 1.75rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      border-radius: var(--radius);
      min-width: 0;
      max-width: 100%;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .panel-title {
      font-family: var(--display);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding-bottom: 0.85rem;
      margin-bottom: 1.1rem;
      border-bottom: 1px solid var(--line);
    }
    .panel-title .num {
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 7px;
      padding: 0.1rem 0.4rem;
      font-size: 0.72rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.85rem;
    }
    .progress-label {
      font-family: var(--display);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .progress-percentage {
      font-family: var(--display);
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
    }
    .progress-bar-container {
      height: 14px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--ink) 7%, transparent);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #ffd2a8));
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(.34,1.2,.64,1);
    }
    .progress-bar-fill.complete { background: linear-gradient(90deg, var(--ok), color-mix(in srgb, var(--ok) 60%, #b6f0d8)); }

    .stepper-container { overflow-x: auto; padding: 10px 4px 12px; margin: -10px -4px -4px; }
    .stepper { display: flex; gap: 1rem; min-width: max-content; }

    .task-node {
      position: relative;
      width: 240px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      padding: 0.9rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(.34,1.4,.64,1), box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .task-node:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .task-node:active { transform: translateY(-1px) scale(0.99); }
    .task-node.done { background: color-mix(in srgb, var(--ok) 12%, var(--surface)); border-color: color-mix(in srgb, var(--ok) 45%, var(--line)); }
    .task-node.done .badge-tdd { color: var(--ink-2); }
    .task-node.active { border-color: var(--accent); }
    .task-node.active::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 5px;
      background: var(--accent);
    }
    .task-node.selected { box-shadow: 0 0 0 2px var(--accent), var(--shadow); }

    .task-node-header { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .task-id {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .task-state {
      font-family: var(--display);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.14rem 0.5rem;
      border: 1px solid currentColor;
      border-radius: 999px;
    }
    .task-title {
      font-size: 0.86rem;
      font-weight: 500;
      line-height: 1.35;
      min-height: 2.3rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .task-badges { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: auto; }
    .badge {
      font-family: var(--display);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.14rem 0.5rem;
      border: 1px solid currentColor;
      border-radius: 999px;
    }
    .badge-important { color: var(--accent); }
    .badge-tdd { color: var(--ink-2); }
    .task-node.done .badge-tdd { color: var(--paper); }
    .badge-active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr);
      gap: 1.75rem;
      align-items: start;
    }
    .grid > * { min-width: 0; }
    @media (max-width: 980px) { .grid { grid-template-columns: minmax(0, 1fr); } }

    .sidebar { display: flex; flex-direction: column; gap: 1.75rem; min-width: 0; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
    .stat-box {
      padding: 1rem;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      transition: background 0.2s ease;
    }
    .stat-box:hover { background: var(--accent-soft); }
    .stat-box:nth-child(2n) { border-right: none; }
    .stat-box:nth-child(n+3) { border-bottom: none; }
    .stat-val {
      font-family: var(--display);
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-top: 0.4rem;
    }

    .settings-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--line);
      padding: 0.6rem 0.85rem;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      border-radius: var(--radius-sm);
      transition: border-color 0.2s ease;
    }
    .setting-row:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
    .toggle {
      font-family: var(--display);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
    }
    .toggle.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
    .toggle.off { background: color-mix(in srgb, var(--ink) 6%, transparent); color: var(--ink-3); }

    .detail-panel { display: flex; flex-direction: column; gap: 1rem; }
    .detail-item { display: flex; flex-direction: column; gap: 0.4rem; }
    .detail-lbl {
      font-family: var(--display);
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .detail-val {
      font-size: 0.82rem;
      color: var(--ink);
      border-left: 3px solid var(--accent);
      padding: 0.1rem 0 0.1rem 0.7rem;
      word-break: break-word;
    }
    .detail-val.approach { white-space: pre-wrap; }
    .detail-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
    .detail-list li {
      font-size: 0.78rem;
      border: 1px solid var(--line);
      padding: 0.4rem 0.6rem;
      background: color-mix(in srgb, var(--ink) 3%, transparent);
      border-radius: var(--radius-sm);
      overflow-wrap: anywhere;
    }
    .detail-list li::before { content: '◆ '; color: var(--accent); font-weight: 700; }

    .debt-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .debt-item-card {
      border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--line));
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      border-radius: var(--radius-sm);
    }

    .empty {
      color: var(--ink-3);
      font-style: normal;
      font-size: 0.86rem;
      text-align: center;
      padding: 1.5rem 1rem;
      line-height: 1.6;
    }
    .empty::before {
      content: '✨';
      display: block;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      filter: grayscale(0.2);
    }

    .markdown-body { font-family: var(--mono); color: var(--ink); font-size: 0.88rem; min-width: 0; overflow-wrap: break-word; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      font-family: var(--display);
      letter-spacing: 0.02em;
      margin: 1.6rem 0 0.9rem;
      line-height: 1.2;
    }
    .markdown-body h1 { font-size: 1.5rem; border-bottom: 1px solid var(--line); padding-bottom: 0.4rem; letter-spacing: 0.02em; }
    .markdown-body h2 { font-size: 1.2rem; border-bottom: 1px solid var(--line); padding-bottom: 0.3rem; }
    .markdown-body h3 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-2); }
    .markdown-body h4 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }
    .markdown-body p { margin-bottom: 0.9rem; line-height: 1.65; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.4rem; margin-bottom: 0.9rem; }
    .markdown-body li { margin: 0.2rem 0; }
    .markdown-body code {
      font-family: var(--mono);
      font-size: 85%;
      background: var(--accent-soft);
      color: color-mix(in srgb, var(--accent) 80%, var(--ink));
      border: none;
      padding: 0.1rem 0.35rem;
      border-radius: 6px;
    }
    .markdown-body pre {
      background: var(--code-bg);
      color: var(--code-fg);
      padding: 1rem;
      overflow: auto;
      margin-bottom: 0.9rem;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius-sm);
    }
    .markdown-body pre code { background: transparent; border: none; color: var(--code-fg); padding: 0; border-radius: 0; }
    .markdown-body blockquote {
      border-left: 4px solid var(--accent);
      padding: 0.4rem 0 0.4rem 0.9rem;
      color: var(--ink-2);
      margin-bottom: 0.9rem;
    }
    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 0.9rem; display: block; overflow-x: auto; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--line); padding: 0.45rem 0.65rem; text-align: left; }
    .markdown-body th { background: var(--code-bg); color: var(--code-fg); font-family: var(--display); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.08em; }

    @keyframes flash { 0% { box-shadow: 0 0 0 3px var(--accent) inset, var(--shadow-hover); } 100% { box-shadow: var(--shadow); } }
    .flash { animation: flash 0.7s ease-out; }

    .spec-panel { min-height: 480px; }

    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      padding: 0.3rem;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      background: var(--surface);
      border-radius: 999px;
    }
    .nav-tab {
      font-family: var(--display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink-2);
      background: transparent;
      border: none;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.18s ease, background 0.18s ease, transform 0.18s cubic-bezier(.34,1.56,.64,1);
    }
    .nav-tab:hover { color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
    .nav-tab:active { transform: translateY(0) scale(0.97); }
    .nav-tab.active { background: var(--accent); color: var(--accent-ink); box-shadow: var(--shadow-sm); }
    .nav-tab.active:hover { color: var(--accent-ink); background: var(--accent); }

    .container-trace {
      max-width: 1320px;
      width: 100%;
      margin: 0 auto;
      padding: 1.75rem;
      flex-grow: 1;
      display: none;
      flex-direction: column;
      gap: 1.75rem;
    }
    .container-trace.visible { display: flex; }

    .trace-task-block { display: flex; flex-direction: column; gap: 0.75rem; }
    .trace-task-title {
      font-family: var(--display);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-left: 4px solid var(--accent);
      padding-left: 0.7rem;
      color: var(--ink);
    }
    .badge-uncovered {
      display: inline-block;
      font-family: var(--display);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
    }
    .trace-fn {
      font-family: var(--mono);
      font-size: 0.76rem;
      word-break: break-all;
    }

    .criteria-gwt { display: flex; flex-direction: column; gap: 1rem; }
    .criteria-gwt .gwt-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 0;
      background: var(--surface);
    }
    .criteria-gwt .gwt-id {
      caption-side: top;
      text-align: left;
      font-family: var(--display);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.72rem;
      padding: 0.45rem 0.7rem;
      background: var(--accent);
      color: var(--accent-ink);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }
    .criteria-gwt .gwt-table th {
      width: 84px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      padding: 0.45rem 0.7rem;
      font-family: var(--display);
      text-transform: uppercase;
      font-size: 0.64rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: var(--accent-soft);
    }
    .criteria-gwt .gwt-table tr:last-child th,
    .criteria-gwt .gwt-table tr:last-child td { border-bottom: none; }
    .criteria-gwt .gwt-table td {
      border-bottom: 1px solid var(--line);
      border-left: 1px solid var(--line);
      padding: 0.45rem 0.7rem;
      font-size: 0.82rem;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .criteria-edge {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }
    .criteria-edge .edge-chip {
      font-size: 0.74rem;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--ink) 4%, transparent);
      overflow-wrap: anywhere;
    }
    .criteria-edge .edge-chip::before { content: '⚡ '; opacity: 0.7; }

    footer {
      border-top: 1px solid var(--line);
      padding: 0.9rem 1.75rem;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .trace-th {
      border: 1px solid var(--line);
      padding: 0.45rem 0.65rem;
      text-align: left;
      background: var(--code-bg);
      color: var(--code-fg);
      font-family: var(--display);
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }

    .trace-th-type {
      width: 60px;
    }

    .trace-td {
      border: 1px solid var(--line);
      padding: 0.45rem 0.65rem;
    }

    .trace-td-label {
      font-size: 0.78rem;
      min-width: 280px;
      overflow-wrap: anywhere;
    }

    .trace-td-type {
      font-size: 0.7rem;
      font-family: var(--display);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-3);
    }

    .trace-td-check {
      text-align: center;
    }

    .trace-th-fn {
      text-transform: none;
      font-family: var(--mono);
      vertical-align: bottom;
      min-width: 140px;
    }
    .trace-fn-name {
      display: block;
      font-size: 0.74rem;
      font-weight: 700;
      word-break: break-word;
    }
    .trace-fn-file {
      display: block;
      font-size: 0.6rem;
      font-weight: 400;
      color: var(--code-fg);
      opacity: 0.6;
      margin-top: 0.25rem;
      word-break: break-all;
    }
    .trace-table-wrap {
      width: 100%;
      overflow-x: auto;
    }
    .trace-table-wrap table {
      width: auto;
      min-width: 100%;
    }
    .trace-td-label {
      max-width: 360px;
    }
    .trace-th-fn {
      max-width: 160px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">TDDMASTER<span class="dot">.</span></span>
      <span class="spec-badge" id="spec-name">…</span>
    </div>
    <nav class="nav-tabs" aria-label="Views">
      <button class="nav-tab active" id="tab-overview" type="button"><span aria-hidden="true">📋</span> Overview</button>
      <button class="nav-tab" id="tab-traceability" type="button"><span aria-hidden="true">🔗</span> Traceability</button>
      <button class="nav-tab" id="tab-coverage" type="button"><span aria-hidden="true">🛡️</span> Coverage</button>
      <button class="nav-tab" id="tab-criteria" type="button"><span aria-hidden="true">🎯</span> Criteria</button>
    </nav>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme"><span id="theme-toggle-label">Dark</span></button>
      <span class="phase-badge" id="phase-badge">—</span>
    </div>
  </header>

  <div class="container">
    <div class="panel">
      <div class="progress-header">
        <span class="progress-label">Task Completion</span>
        <span class="progress-percentage" id="progress-percentage">0%</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="stepper-container">
        <div class="stepper" id="stepper"></div>
      </div>
    </div>

    <div class="grid">
      <div class="panel spec-panel">
        <div class="panel-title"><span class="num">01</span> Specification · spec.md</div>
        <div class="markdown-body" id="spec-markdown"></div>
      </div>

      <div class="sidebar">
        <div class="panel">
          <div class="panel-title"><span class="num">02</span> Execution Stats</div>
          <div class="stats-grid">
            <div class="stat-box"><div class="stat-val" id="stat-iteration">—</div><div class="stat-lbl">Iteration</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-completed">—</div><div class="stat-lbl">Completed</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-refactors">—</div><div class="stat-lbl">Refactors</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-debt">—</div><div class="stat-lbl">TDD Phase</div></div>
          </div>
        </div>

        <div class="panel" id="settings-card" style="display:none;">
          <div class="panel-title"><span class="num">03</span> Spec Settings</div>
          <div class="settings-list" id="settings-list"></div>
        </div>

        <div class="panel" id="task-detail-card" style="display:none;">
          <div class="panel-title" id="task-detail-title">Task Details</div>
          <div class="detail-panel" id="task-detail-panel"></div>
        </div>

        <div class="panel" id="debt-card" style="display:none;">
          <div class="panel-title"><span class="num">04</span> Technical Debt</div>
          <div class="debt-list" id="debt-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="container-trace" id="container-trace"></div>

  <div class="container-trace" id="container-coverage"></div>

  <div class="container-trace" id="container-criteria"></div>

  <footer>
    <span>tddmaster · spec visualizer</span>
    <span id="footer-updated">—</span>
  </footer>

  <script>
    function applyTheme(theme) {
      const dark = theme === 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      const label = document.getElementById('theme-toggle-label');
      if (label) label.textContent = dark ? 'Light' : 'Dark';
    }

    function initTheme() {
      let theme = null;
      try { theme = localStorage.getItem('viz-theme'); } catch (e) {}
      if (!theme) {
        theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      applyTheme(theme);
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', () => {
          const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          applyTheme(next);
          try { localStorage.setItem('viz-theme', next); } catch (e) {}
        });
      }
    }

    let currentHash = '';
    let activeTaskID = '';
    let selectedTaskID = null;
    let progressData = null;
    let stateData = null;
    let settingsData = null;
    let traceData = null;

    function initNav() {
      const tabOverview = document.getElementById('tab-overview');
      const tabTrace = document.getElementById('tab-traceability');
      const tabCoverage = document.getElementById('tab-coverage');
      const tabCriteria = document.getElementById('tab-criteria');
      const containerMain = document.querySelector('.container');
      const containerTrace = document.getElementById('container-trace');
      const containerCoverage = document.getElementById('container-coverage');

      const tabs = [tabOverview, tabTrace, tabCoverage, tabCriteria].filter(Boolean);

      function activate(tab, view) {
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        containerMain.style.display = view === 'overview' ? '' : 'none';
        containerTrace.classList.toggle('visible', view === 'trace');
        containerCoverage.classList.toggle('visible', view === 'coverage');
        const containerCriteria = document.getElementById('container-criteria');
        if (containerCriteria) containerCriteria.classList.toggle('visible', view === 'criteria');
      }

      tabOverview.addEventListener('click', () => activate(tabOverview, 'overview'));
      tabTrace.addEventListener('click', () => activate(tabTrace, 'trace'));
      tabCoverage.addEventListener('click', () => activate(tabCoverage, 'coverage'));
      if (tabCriteria) tabCriteria.addEventListener('click', () => activate(tabCriteria, 'criteria'));
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function taskNum(id) {
      const m = String(id || '').match(/(\d+)/);
      return m ? parseInt(m[1], 10) : 0;
    }

    function criterionText(c) {
      if (!c) return '';
      if (typeof c === 'string') return c;
      if (c.raw && c.raw.trim()) return c.raw;
      const parts = [];
      if (c.given) parts.push('GIVEN ' + c.given);
      if (c.when) parts.push('WHEN ' + c.when);
      if (c.then) parts.push('THEN ' + c.then);
      return parts.join(' · ');
    }

    function criterionHTML(c) {
      const id = (c && c.id) ? esc(String(c.id).toUpperCase()) + ' — ' : '';
      return '<strong>' + id + '</strong>' + esc(criterionText(c));
    }

    async function loadData() {
      try {
        const [progressRes, specRes, stateRes, settingsRes, traceRes] = await Promise.all([
          fetch('/progress.json').then(r => r.ok ? r.json() : null),
          fetch('/spec.md').then(r => r.ok ? r.text() : ''),
          fetch('/state.json').then(r => r.ok ? r.json() : null),
          fetch('/settings.json').then(r => r.ok ? r.json() : null),
          fetch('/traceability.json').then(r => r.ok ? r.json() : null)
        ]);

        progressData = progressRes;
        stateData = stateRes;
        settingsData = settingsRes;
        traceData = traceRes;

        renderHeader();
        renderProgress();
        renderStepper();
        renderMarkdown(specRes);
        renderStats();
        renderSettings();
        renderFooter();
        renderTraceability();
        renderCoverage();
        renderCriteria();

        const c = document.querySelector('.container');
        if (c) { c.classList.remove('flash'); void c.offsetWidth; }
      } catch (err) {
        console.error('load failed:', err);
      }
    }

    function renderHeader() {
      const name = (progressData && progressData.spec) || (stateData && stateData.slug) || 'unknown';
      document.getElementById('spec-name').textContent = name;

      const phase = (stateData && stateData.phase) || (progressData && progressData.status) || 'unknown';
      const badge = document.getElementById('phase-badge');
      badge.textContent = phase.replace(/[-_]/g, ' ');
      badge.className = 'phase-badge phase-' + phase.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    }

    function renderProgress() {
      const tasks = (progressData && progressData.tasks) || [];
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const pct = total ? Math.round((done / total) * 100) : 0;

      document.getElementById('progress-percentage').textContent = pct + '%';
      const fill = document.getElementById('progress-fill');
      fill.style.width = pct + '%';
      fill.classList.toggle('complete', pct >= 100);
    }

    function sortedTasks() {
      const tasks = ((progressData && progressData.tasks) || []).slice();
      tasks.sort((a, b) => taskNum(a.id) - taskNum(b.id));
      return tasks;
    }

    function renderStepper() {
      const tasks = sortedTasks();

      activeTaskID = '';
      for (const t of tasks) {
        if (!t.done) { activeTaskID = t.id; break; }
      }

      const stepper = document.getElementById('stepper');
      stepper.innerHTML = '';

      if (!tasks.length) {
        stepper.innerHTML = '<div class="empty">No tasks yet. Discovery in progress.</div>';
        document.getElementById('task-detail-card').style.display = 'none';
        return;
      }

      tasks.forEach(t => {
        const isActive = t.id === activeTaskID;
        const node = document.createElement('div');
        node.className = 'task-node' + (t.done ? ' done' : '') + (isActive ? ' active' : '') + (t.id === selectedTaskID ? ' selected' : '');

        let state = 'Todo';
        if (t.done) state = 'Done';
        else if (isActive) state = '▶ Active';

        node.innerHTML =
          '<div class="task-node-header">' +
            '<span class="task-id">' + esc(t.id) + '</span>' +
            '<span class="task-state">' + state + '</span>' +
          '</div>' +
          '<div class="task-title">' + esc(t.title) + '</div>' +
          '<div class="task-badges">' +
            (t.important ? '<span class="badge badge-important">Important</span>' : '') +
            (t.tddEnabled ? '<span class="badge badge-tdd">TDD</span>' : '') +
            (isActive ? '<span class="badge badge-active">Active</span>' : '') +
          '</div>';

        node.addEventListener('click', () => {
          selectedTaskID = t.id;
          renderStepper();
          showTaskDetails(t);
        });

        stepper.appendChild(node);
      });

      const focus = selectedTaskID || activeTaskID;
      const focusTask = tasks.find(t => t.id === focus);
      if (focusTask) showTaskDetails(focusTask);
    }

    function plansMap() {
      return (progressData && progressData.execution && progressData.execution.taskPlans) || {};
    }

    function showTaskDetails(task) {
      const card = document.getElementById('task-detail-card');
      const panel = document.getElementById('task-detail-panel');
      document.getElementById('task-detail-title').textContent = 'Task Details · ' + task.id;
      card.style.display = 'block';

      let st = 'Todo';
      if (task.done) st = 'Done';
      else if (task.id === activeTaskID) st = 'Active';

      let html =
        '<div class="detail-item"><div class="detail-lbl">Title</div>' +
        '<div class="detail-val">' + esc(task.title) + '</div></div>' +
        '<div class="detail-item"><div class="detail-lbl">Status</div>' +
        '<div class="detail-val">' + st + '</div></div>';

      if (task.criteria && task.criteria.length) {
        html += '<div class="detail-item"><div class="detail-lbl">Acceptance Criteria</div><ul class="detail-list">' +
          task.criteria.map(c => '<li>' + criterionHTML(c) + '</li>').join('') + '</ul></div>';
      }
      if (task.edgeCases && task.edgeCases.length) {
        html += '<div class="detail-item"><div class="detail-lbl">Edge Cases</div><ul class="detail-list">' +
          task.edgeCases.map(a => '<li>' + esc(a) + '</li>').join('') + '</ul></div>';
      }

      const plan = plansMap()[task.id];
      if (plan) {
        if (plan.approach) {
          html += '<div class="detail-item"><div class="detail-lbl">Approved Plan</div>' +
            '<div class="detail-val approach">' + esc(plan.approach) + '</div></div>';
        }
        html += planList('Touched Files', plan.touchedFiles);
        html += planList('Design Patterns', plan.designPatterns);
        html += planList('Best Practices', plan.bestPractices);
        html += planList('Assumptions', plan.assumptions);
      } else if (task.important) {
        html += '<div class="detail-item"><div class="detail-lbl">Plan</div>' +
          '<div class="detail-val" style="color:var(--accent)">Important task without an approved plan yet.</div></div>';
      }

      panel.innerHTML = html;
    }

    function planList(label, arr) {
      if (!arr || !arr.length) return '';
      return '<div class="detail-item"><div class="detail-lbl">' + label + '</div><ul class="detail-list">' +
        arr.map(x => '<li>' + esc(x) + '</li>').join('') + '</ul></div>';
    }

    function renderMarkdown(md) {
      const c = document.getElementById('spec-markdown');
      if (!md) { c.innerHTML = '<p class="empty">No specification document yet.</p>'; return; }
      if (window.marked) c.innerHTML = marked.parse(md);
      else c.textContent = md;
    }

    function renderStats() {
      const ex = (progressData && progressData.execution) || {};
      document.getElementById('stat-iteration').textContent = ex.iteration != null ? ex.iteration : '0';

      const tasks = (progressData && progressData.tasks) || [];
      const done = tasks.filter(t => t.done).length;
      document.getElementById('stat-completed').textContent = done + '/' + tasks.length;

      document.getElementById('stat-refactors').textContent = ex.refactorRounds != null ? ex.refactorRounds : '0';

      const cycle = ex.tddCycle && ex.tddCycle.length ? ex.tddCycle : '—';
      document.getElementById('stat-debt').textContent = cycle;
    }

    function renderSettings() {
      const card = document.getElementById('settings-card');
      const list = document.getElementById('settings-list');
      if (!settingsData) { card.style.display = 'none'; return; }
      card.style.display = 'block';
      const toggleRows = [
        ['TDD Enabled', settingsData.tddEnabled],
        ['Skip Verifier', settingsData.skipVerifierEnabled],
        ['Important Gate', settingsData.importantTaskGateEnabled]
      ];
      const minCov = settingsData.minTestCoverage != null ? settingsData.minTestCoverage : 0;
      list.innerHTML = toggleRows.map(r =>
        '<div class="setting-row"><span>' + r[0] + '</span>' +
        '<span class="toggle ' + (r[1] ? 'on' : 'off') + '">' + (r[1] ? 'On' : 'Off') + '</span></div>'
      ).join('') +
        '<div class="setting-row"><span>Min Coverage</span>' +
        '<span class="toggle off">' + minCov + '%</span></div>';
    }

    function renderFooter() {
      const u = (progressData && progressData.updatedAt) || (stateData && stateData.updatedAt);
      document.getElementById('footer-updated').textContent = u ? ('updated ' + new Date(u).toLocaleString()) : '';
    }

    function coverageBadge(file) {
      if (!traceData || !traceData.coverage) return '';
      const pct = traceData.coverage[file];
      if (pct == null) return '';
      const minCov = (settingsData && settingsData.minTestCoverage != null) ? settingsData.minTestCoverage : 0;
      if (minCov === 0) return '';
      const color = pct >= minCov ? 'var(--ok)' : 'var(--accent)';
      return ' <span style="font-family:var(--display);font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.1rem 0.35rem;border:1.5px solid ' + color + ';color:' + color + ';">' + pct + '%</span>';
    }

    function renderCoverage() {
      const ct = document.getElementById('container-coverage');
      if (!ct) return;
      ct.innerHTML = '';
      const coverage = (traceData && traceData.coverage && typeof traceData.coverage === 'object') ? traceData.coverage : {};
      const files = Object.keys(coverage).sort();
      if (!files.length) {
        ct.innerHTML = '<div class="panel"><div class="empty">No coverage measured yet. Coverage is recorded by the TDD green-phase verifier when min coverage is enabled.</div></div>';
        return;
      }
      const minCov = (settingsData && settingsData.minTestCoverage != null) ? settingsData.minTestCoverage : 0;
      const panel = document.createElement('div');
      panel.className = 'panel trace-task-block';
      const title = document.createElement('div');
      title.className = 'trace-task-title';
      title.textContent = 'File Coverage' + (minCov > 0 ? ' · min ' + minCov + '%' : ' · gate disabled');
      panel.appendChild(title);
      const table = document.createElement('table');
      table.style.borderCollapse = 'collapse';
      const tbody = document.createElement('tbody');
      files.forEach(file => {
        const pct = coverage[file];
        const tr = document.createElement('tr');
        const tdFile = document.createElement('td');
        tdFile.className = 'trace-td trace-td-label';
        tdFile.textContent = file;
        tr.appendChild(tdFile);
        const tdPct = document.createElement('td');
        tdPct.className = 'trace-td';
        const color = (minCov > 0 && pct < minCov) ? 'var(--accent)' : 'var(--ok)';
        tdPct.innerHTML = '<span style="font-family:var(--display);font-weight:700;color:' + color + ';">' + pct + '%</span>';
        tr.appendChild(tdPct);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const wrap = document.createElement('div');
      wrap.className = 'trace-table-wrap';
      wrap.appendChild(table);
      panel.appendChild(wrap);
      ct.appendChild(panel);
    }

    function gwtRow(label, value) {
      if (!value) return '';
      return '<tr><th>' + label + '</th><td>' + esc(value) + '</td></tr>';
    }

    function criterionTable(c, fallbackId) {
      const id = String((c && c.id) || fallbackId || '').toUpperCase();
      let rows = '';
      if (c && typeof c === 'object' && (c.given || c.when || c.then)) {
        rows += gwtRow('Given', c.given);
        rows += gwtRow('When', c.when);
        rows += gwtRow('Then', c.then);
      } else {
        rows += gwtRow('Criterion', criterionText(c));
      }
      if (!rows) return '';
      return '<table class="gwt-table">' +
        (id ? '<caption class="gwt-id">' + esc(id) + '</caption>' : '') +
        '<tbody>' + rows + '</tbody></table>';
    }

    function renderCriteria() {
      const ct = document.getElementById('container-criteria');
      if (!ct) return;
      ct.innerHTML = '';

      const tasks = sortedTasks();
      if (!tasks.length) {
        ct.innerHTML = '<div class="panel"><div class="empty">Henüz acceptance criteria oluşturulmadı.<br>Görevler ve kriterleri discovery/refinement aşamasında belirlenir.</div></div>';
        return;
      }

      const withCriteria = tasks.filter(t =>
        (t.criteria && t.criteria.length) || (t.edgeCases && t.edgeCases.length));
      if (!withCriteria.length) {
        ct.innerHTML = '<div class="panel"><div class="empty">Görevler var ama henüz kriter tanımlanmadı.<br>Given/When/Then kriterleri refinement aşamasında eklenir.</div></div>';
        return;
      }

      tasks.forEach(task => {
        const acList = (task.criteria) || [];
        const ecList = (task.edgeCases) || [];

        const block = document.createElement('div');
        block.className = 'panel trace-task-block';

        const titleEl = document.createElement('div');
        titleEl.className = 'trace-task-title';
        titleEl.textContent = (task.id || '') + ' · ' + (task.title || '');
        block.appendChild(titleEl);

        if (!acList.length && !ecList.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.innerHTML = 'Bu görev için kriter tanımlanmadı.';
          block.appendChild(empty);
          ct.appendChild(block);
          return;
        }

        if (acList.length) {
          const gwt = document.createElement('div');
          gwt.className = 'criteria-gwt';
          gwt.innerHTML = acList
            .map((c, i) => criterionTable(c, 'ac-' + (i + 1)))
            .join('');
          block.appendChild(gwt);
        }

        if (ecList.length) {
          const edge = document.createElement('div');
          edge.className = 'criteria-edge';
          edge.innerHTML = ecList
            .map(ec => '<span class="edge-chip">' + esc(ec) + '</span>')
            .join('');
          block.appendChild(edge);
        }

        ct.appendChild(block);
      });
    }

    function renderTraceability() {
      const ct = document.getElementById('container-trace');
      if (!ct) return;
      ct.innerHTML = '';

      const entries = (traceData && traceData.entries && typeof traceData.entries === 'object') ? traceData.entries : {};
      const tasks = (progressData && progressData.tasks) || [];

      if (!tasks.length) {
        ct.innerHTML = '<div class="panel"><div class="empty">No tasks yet.</div></div>';
        return;
      }

      tasks.forEach(task => {
        const acList = (task.criteria) || [];
        const ecList = (task.edgeCases) || [];

        const flat = [];
        Object.keys(entries).forEach(fileKey => {
          const arr = entries[fileKey] || [];
          arr.forEach(e => {
            const tid = e.taskId || e.TaskID || '';
            if (tid === task.id) {
              flat.push({
                file: fileKey,
                fn: e.functionName || e.FunctionName || '',
                cids: e.criterionIds || e.CriterionIDs || e.ac || e.AC || [],
                ec: e.ec || e.EC || []
              });
            }
          });
        });

        const cols = [];
        const seenCols = new Set();
        flat.forEach(x => {
          if (!x.fn) return;
          const key = x.file + '::' + x.fn;
          if (!seenCols.has(key)) {
            seenCols.add(key);
            cols.push(key);
          }
        });

        const block = document.createElement('div');
        block.className = 'panel trace-task-block';

        const titleEl = document.createElement('div');
        titleEl.className = 'trace-task-title';
        titleEl.textContent = (task.id || '') + ' · ' + (task.title || '');
        block.appendChild(titleEl);

        if (!acList.length && !ecList.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'No acceptance criteria or edge cases defined.';
          block.appendChild(empty);
          ct.appendChild(block);
          return;
        }

        const table = document.createElement('table');
        table.style.borderCollapse = 'collapse';

        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');

        const thRow = document.createElement('th');
        thRow.className = 'trace-th';
        thRow.textContent = 'AC / EC';
        headerRow.appendChild(thRow);

        const thType = document.createElement('th');
        thType.className = 'trace-th trace-th-type';
        thType.textContent = 'Type';
        headerRow.appendChild(thType);

        cols.forEach(col => {
          const sep = col.indexOf('::');
          const fileName = sep !== -1 ? col.slice(0, sep) : '';
          const fnName = sep !== -1 ? col.slice(sep + 2) : col;
          const th = document.createElement('th');
          th.className = 'trace-th trace-th-fn';
          th.innerHTML = '<span class="trace-fn-name">' + esc(fnName) + '</span>' +
            (fileName ? '<span class="trace-fn-file">' + esc(fileName) + coverageBadge(fileName) + '</span>' : '');
          headerRow.appendChild(th);
        });

        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');

        const buildRow = (label, type, matchFn) => {
          const tr = document.createElement('tr');

          const tdLabel = document.createElement('td');
          tdLabel.className = 'trace-td trace-td-label';
          tdLabel.textContent = label;
          tr.appendChild(tdLabel);

          const tdType = document.createElement('td');
          tdType.className = 'trace-td trace-td-type';
          tdType.textContent = type;
          tr.appendChild(tdType);

          let linked = 0;
          cols.forEach(col => {
            const matches = flat.some(x => (x.file + '::' + x.fn) === col && matchFn(x));
            if (matches) linked++;
            const td_ = document.createElement('td');
            td_.className = 'trace-td trace-td-check';
            td_.textContent = matches ? '✓' : '';
            if (matches) td_.style.color = 'var(--ok)';
            tr.appendChild(td_);
          });

          if (!cols.length || linked === 0) {
            const tdUncov = document.createElement('td');
            tdUncov.className = 'trace-td';
            tdUncov.innerHTML = '<span class="badge-uncovered">UNCOVERED</span>';
            tr.appendChild(tdUncov);
          }

          tbody.appendChild(tr);
        };

        acList.forEach((c, i) => {
          const cid = String((c && c.id) || ('ac-' + (i + 1))).toLowerCase();
          const label = cid.toUpperCase() + ' — ' + criterionText(c);
          buildRow(label, 'AC', x => {
            const arr = x.cids || [];
            return arr.some(a => String(a).toLowerCase() === cid);
          });
        });

        ecList.forEach((ec, i) => {
          const ecId = 'EC-' + (i + 1);
          buildRow(ec, 'EC', x => {
            const arr = x.ec || [];
            return arr.indexOf(ecId) !== -1 || arr.indexOf(ec) !== -1;
          });
        });

        table.appendChild(tbody);
        const tableWrap = document.createElement('div');
        tableWrap.className = 'trace-table-wrap';
        tableWrap.appendChild(table);
        block.appendChild(tableWrap);
        ct.appendChild(block);
      });
    }

    async function checkUpdates() {
      try {
        const r = await fetch('/api/status');
        if (!r.ok) return;
        const data = await r.json();
        if (currentHash && data.hash !== currentHash) {
          await loadData();
          const c = document.querySelector('.container');
          if (c) { c.classList.add('flash'); }
        }
        currentHash = data.hash;
      } catch (err) {
        console.error('status check failed:', err);
      }
    }

    initTheme();
    initNav();
    loadData().then(() => { setInterval(checkUpdates, 1000); });
  </script>
</body>
</html>
